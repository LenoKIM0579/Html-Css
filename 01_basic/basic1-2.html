  <h2>웹 퍼블리싱&nbsp;&nbsp;&nbsp;용어&nbsp;&nbsp;&nbsp;&nbsp;사전</h2>
  <hr>
  <p>웹 표준 개발자라면 반드시 알아야 할 필수 키워드입니다.</p>
  <dl>
    <dt><strong>&lt;HTML5&gt;</strong></dt>
    <dd>웹 페이지의 뼈대를 만드는 가장 기초적인 마크업 언어입니다.</dd>
    <dt><strong>시맨틱 태그(Semantic Tag)</strong></dt>
    <dd>태그 자체가 의미를 가짐으로써 브라우저와 개발자가 그 역할을 명확히 알 수 있게 합니다.</dd>
    <dt><strong>웹 접근성(& 웹 표준)</strong></dt>
    <dd>어떠한 환경에서도 사용자가 정보에 평등하게 접근할 수 있도록 보장하는 것을 의미합니다.</dd>
  </dl>
  <hr>
  <p>위 용어들은 웹 표준 검사 시 매우 중요하게 다루어집니다.</p>
